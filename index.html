<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusPulse AI | Student Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@500;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-deep: #08121f;
      --bg-mid: #10263f;
      --bg-soft: #173b61;
      --accent-cyan: #39f9ff;
      --accent-orange: #ff9f5a;
      --accent-lime: #c9ff5a;
      --text-main: #f8fbff;
      --text-muted: #b7c4d6;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 10% 20%, rgba(57, 249, 255, 0.22), transparent 28%),
        radial-gradient(circle at 85% 0%, rgba(255, 159, 90, 0.2), transparent 32%),
        radial-gradient(circle at 90% 90%, rgba(201, 255, 90, 0.12), transparent 34%),
        linear-gradient(155deg, var(--bg-deep), var(--bg-mid) 48%, var(--bg-soft));
      overflow-x: hidden;
    }

    .grain::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 4px 4px;
      mix-blend-mode: soft-light;
      opacity: 0.15;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    .container {
      max-width: 1160px;
      margin: 0 auto;
      padding: 26px 18px 70px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .brand {
      font-family: 'Sora', sans-serif;
      letter-spacing: 0.4px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .badge {
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--accent-cyan);
      border-radius: 999px;
      padding: 9px 15px;
      font-size: 0.84rem;
      backdrop-filter: blur(6px);
      animation: pulse 2.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(57, 249, 255, 0); }
      50% { box-shadow: 0 0 28px rgba(57, 249, 255, 0.28); }
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 22px;
      align-items: stretch;
    }

    .panel {
      border-radius: 22px;
      border: 1px solid var(--glass-border);
      background: linear-gradient(160deg, rgba(255,255,255,0.11), rgba(255,255,255,0.04));
      padding: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
      transform-style: preserve-3d;
    }

    .panel:hover {
      transform: translateY(-6px) rotateX(2.4deg) rotateY(-2deg);
      box-shadow: 0 24px 52px rgba(0, 0, 0, 0.36);
    }

    h1 {
      margin: 0;
      font-family: 'Sora', sans-serif;
      font-size: clamp(2rem, 4vw, 3.15rem);
      line-height: 1.04;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 1rem;
      margin: 14px 0 0;
      line-height: 1.6;
      max-width: 60ch;
    }

    .stat-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 18, 31, 0.42);
      padding: 10px;
      text-align: center;
    }

    .stat strong { color: var(--accent-cyan); font-size: 1.2rem; }
    .stat span { display: block; color: var(--text-muted); font-size: 0.82rem; margin-top: 5px; }

    .help-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .help-list li {
      background: rgba(8, 18, 31, 0.52);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px;
      color: #e8f2ff;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .help-list li:hover {
      border-color: var(--accent-orange);
      transform: translateX(6px);
    }

    .main {
      margin-top: 24px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .faq-item {
      margin-bottom: 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
      background: rgba(6, 15, 25, 0.56);
    }

    .faq-btn {
      width: 100%;
      border: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: inherit;
      color: var(--text-main);
      background: transparent;
      padding: 12px;
      cursor: pointer;
      text-align: left;
    }

    .faq-btn:hover { background: rgba(255,255,255,0.06); }

    .faq-body {
      padding: 0 12px 12px;
      color: var(--text-muted);
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .input, .textarea, .select {
      width: 100%;
      font: inherit;
      color: #ebf7ff;
      background: rgba(1, 9, 16, 0.62);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      transition: border-color 0.22s ease, transform 0.2s ease;
    }

    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--accent-cyan);
      transform: translateY(-1px);
    }

    .textarea { min-height: 112px; resize: vertical; }

    .form-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .full { grid-column: 1 / -1; }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent-cyan), #6ee9ff, var(--accent-orange));
      color: #062033;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 26px rgba(57, 249, 255, 0.25);
    }

    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: var(--accent-lime);
      min-height: 1.3em;
    }

    .small {
      margin-top: 16px;
      font-size: 0.82rem;
      color: #9bb2cb;
    }

    .mentor-section {
      margin-top: 24px;
    }

    .mentor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .mentor-card {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(2, 12, 22, 0.55);
      padding: 12px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .mentor-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent-cyan);
    }

    .mentor-name {
      margin: 0;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
    }

    .mentor-role {
      margin: 6px 0;
      color: #d9eeff;
      font-size: 0.9rem;
    }

    .mentor-meta {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    @media (max-width: 920px) {
      .hero, .main, .mentor-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .container { padding-top: 20px; }
    }
  </style>
</head>
<body class="grain">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const faqData = [
      {
        q: 'How do I check my class schedule?',
        a: 'Ask: "Show my class timings" in Kommunicate chat. Connect your SIS later for personalized timetables.'
      },
      {
        q: 'How can I submit exam-related concerns?',
        a: 'Use the query form below. The bot stores your concern and your support team can track resolution.'
      },
      {
        q: 'Can this bot run on Facebook Messenger?',
        a: 'Yes. Connect your Kommunicate bot to Facebook Page in channel setup and publish.'
      },
      {
        q: 'Where are conversations saved?',
        a: 'Every interaction is logged into Supabase tables: student_conversations and student_queries.'
      },
      {
        q: 'Can I ask for mentor details?',
        a: 'Yes. Ask in chat: "Who are mentors?" or "Tell me about Hamza Siddiqui".'
      }
    ];

    const mentorData = [
      {
        code: 'AREEBA_KHAN',
        name: 'Areeba Khan',
        role: 'Lead Mentor - Web Development',
        expertise: 'React, Node.js, REST APIs',
        officeHours: 'Mon/Wed 4:00 PM - 6:00 PM',
        contact: 'areeba.khan@campuspulse.edu'
      },
      {
        code: 'HAMZA_SIDDIQUI',
        name: 'Hamza Siddiqui',
        role: 'Senior Mentor - Generative & Chatbot Development',
        expertise: 'LLM prompting, RAG pipelines, chatbot architecture',
        officeHours: 'Tue/Thu 3:00 PM - 5:00 PM',
        contact: 'hamza.siddiqui@campuspulse.edu'
      },
      {
        code: 'MAHNOOR_AHMED',
        name: 'Mahnoor Ahmed',
        role: 'Mentor - Shopify E-Commerce',
        expertise: 'Shopify setup, payment gateways, conversion optimization',
        officeHours: 'Mon/Fri 1:00 PM - 3:00 PM',
        contact: 'mahnoor.ahmed@campuspulse.edu'
      },
      {
        code: 'ZAIN_ALI',
        name: 'Zain Ali',
        role: 'Mentor - Modren web and app',
        expertise: 'React Native, Next.js, app deployment',
        officeHours: 'Wed/Sat 11:00 AM - 1:00 PM',
        contact: 'zain.ali@campuspulse.edu'
      }
    ];

    function App() {
      const [openIndex, setOpenIndex] = useState(0);
      const [status, setStatus] = useState('');
      const [form, setForm] = useState({
        studentName: '',
        studentEmail: '',
        courseCode: '',
        queryText: ''
      });

      const updateField = (key, value) => setForm((prev) => ({ ...prev, [key]: value }));

      const submitQuery = async (e) => {
        e.preventDefault();
        setStatus('Submitting...');

        try {
          const res = await fetch('/api/student-query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Failed to submit query.');
          }

          setStatus('Query submitted. Student support will follow up soon.');
          setForm({ studentName: '', studentEmail: '', courseCode: '', queryText: '' });
        } catch (err) {
          setStatus(err.message || 'Something went wrong.');
        }
      };

      return (
        <div className="container">
          <header className="nav">
            <div className="brand">CampusPulse AI</div>
            <div className="badge">Live Student Support</div>
          </header>

          <section className="hero">
            <article className="panel">
              <h1>AI-Powered Student Helpdesk Bot for modern campus life.</h1>
              <p>
                Resolve course questions instantly, collect unresolved student concerns,
                and run one omnichannel support flow across web + Facebook via Kommunicate.
              </p>

              <div className="stat-grid">
                <div className="stat"><strong>24/7</strong><span>Auto support</span></div>
                <div className="stat"><strong>1-click</strong><span>Facebook launch</span></div>
                <div className="stat"><strong>100%</strong><span>DB logging</span></div>
              </div>
            </article>

            <aside className="panel">
              <h2 style={{ marginTop: 0, fontFamily: 'Sora, sans-serif' }}>What this bot handles</h2>
              <ul className="help-list">
                <li>Answers course-related FAQs using Kommunicate intents.</li>
                <li>Shares teachers/mentors directory with expertise and office hours.</li>
                <li>Captures unresolved student concerns through conversational forms.</li>
                <li>Stores all conversations and submitted queries in Supabase.</li>
                <li>Supports website widget plus Facebook channel via Kommunicate.</li>
              </ul>
            </aside>
          </section>

          <section className="mentor-section">
            <article className="panel">
              <h2 style={{ marginTop: 0, fontFamily: 'Sora, sans-serif' }}>Campus Teachers & Mentors</h2>
              <div className="mentor-grid">
                {mentorData.map((mentor) => (
                  <article className="mentor-card" key={mentor.code}>
                    <h3 className="mentor-name">{mentor.name}</h3>
                    <p className="mentor-role">{mentor.role}</p>
                    <p className="mentor-meta">Expertise: {mentor.expertise}</p>
                    <p className="mentor-meta">Office hours: {mentor.officeHours}</p>
                    <p className="mentor-meta">Contact: {mentor.contact}</p>
                  </article>
                ))}
              </div>
            </article>
          </section>

          <section className="main">
            <article className="panel">
              <h2 style={{ marginTop: 0, fontFamily: 'Sora, sans-serif' }}>Student FAQ Preview</h2>
              {faqData.map((item, i) => (
                <div className="faq-item" key={item.q}>
                  <button
                    className="faq-btn"
                    onClick={() => setOpenIndex((prev) => (prev === i ? -1 : i))}
                    type="button"
                  >
                    <span>{item.q}</span>
                    <span>{openIndex === i ? '-' : '+'}</span>
                  </button>
                  {openIndex === i ? <div className="faq-body">{item.a}</div> : null}
                </div>
              ))}
            </article>

            <article className="panel">
              <h2 style={{ marginTop: 0, fontFamily: 'Sora, sans-serif' }}>Submit Student Query</h2>
              <form onSubmit={submitQuery} className="form-grid">
                <input
                  className="input"
                  placeholder="Student name"
                  value={form.studentName}
                  onChange={(e) => updateField('studentName', e.target.value)}
                  required
                />
                <input
                  type="email"
                  className="input"
                  placeholder="Student email"
                  value={form.studentEmail}
                  onChange={(e) => updateField('studentEmail', e.target.value)}
                  required
                />
                <select
                  className="select full"
                  value={form.courseCode}
                  onChange={(e) => updateField('courseCode', e.target.value)}
                  required
                >
                  <option value="">Select course</option>
                  <option value="WEB_DEV">WEB_DEV - Web Development</option>
                  <option value="GEN_CHATBOT">GEN_CHATBOT - Generative & Chatbot Development</option>
                  <option value="SHOPIFY">SHOPIFY - Shopify E-Commerce</option>
                  <option value="MODERN_WEB_APP">MODERN_WEB_APP - Modren web and app</option>
                </select>
                <textarea
                  className="textarea full"
                  placeholder="Write your question or issue..."
                  value={form.queryText}
                  onChange={(e) => updateField('queryText', e.target.value)}
                  required
                />
                <button className="btn full" type="submit">Submit Query</button>
              </form>
              <div className="status">{status}</div>
            </article>
          </section>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script type="text/javascript">
    (function(d, m){
      var kommunicateSettings = {
        appId: '1a49026b7279fe2159d8794cd36774e8f',
        popupWidget: true,
        automaticChatOpenOnNavigation: true
      };
      window.kommunicate = m;
      m._globals = kommunicateSettings;
      var s = d.createElement('script');
      s.type = 'text/javascript';
      s.async = true;
      s.src = 'https://widget.kommunicate.io/v2/kommunicate.app';
      var h = d.getElementsByTagName('head')[0];
      h.appendChild(s);
    })(document, window.kommunicate || {});
  </script>
</body>
</html>
